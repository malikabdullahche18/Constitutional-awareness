<!DOCTYPE html>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  background: #0e1e14;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 25% 30%, rgba(26,107,74,.3) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 70%, rgba(184,150,62,.15) 0%, transparent 55%);
}
.card {
  background: #ffffff;
  border-radius: 24px;
  padding: 52px 48px;
  width: 440px;
  max-width: 100%;
  position: relative;
  z-index: 2;
  box-shadow: 0 32px 80px rgba(0,0,0,.35);
}
.card-logo {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 36px;
}
.logo-shield {
  width: 48px; height: 48px;
  background: #1a6b4a;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
}
.logo-shield svg { width: 24px; }
.logo-text strong {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px; font-weight: 700;
  color: #0e1e14;
  display: block; line-height: 1.2;
}
.logo-text span {
  font-size: 11px; font-weight: 400;
  color: #7a9182;
  text-transform: uppercase; letter-spacing: .08em;
}
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.1rem; font-weight: 700;
  color: #0e1e14;
  margin-bottom: 6px;
}
.sub { font-size: 14px; color: #7a9182; margin-bottom: 36px; font-weight: 300; }

.field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }
.field label { font-size: 13px; font-weight: 600; color: #3d5244; }
.field input {
  padding: 14px 18px;
  border: 2px solid #dde8e2;
  border-radius: 11px;
  font-size: 15px;
  font-family: 'Outfit', sans-serif;
  color: #1a2b1f;
  outline: none;
  transition: .2s;
}
.field input:focus {
  border-color: #1a6b4a;
  box-shadow: 0 0 0 4px rgba(26,107,74,.08);
}

.err-msg {
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 13px; font-weight: 500;
  color: #dc2626;
  margin-bottom: 16px;
  display: none;
  align-items: center; gap: 8px;
}
.err-msg.show { display: flex; }

.btn-login {
  width: 100%;
  padding: 15px;
  background: #1a6b4a;
  color: white;
  border: none;
  border-radius: 100px;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: .2s;
  margin-top: 4px;
}
.btn-login:hover { background: #22885e; }

.card-footer {
  margin-top: 28px;
  padding-top: 22px;
  border-top: 1px solid #dde8e2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.card-footer a {
  font-size: 13px; color: #7a9182;
  text-decoration: none; transition: .2s;
}
.card-footer a:hover { color: #1a6b4a; }
.hint {
  font-size: 12px; color: #a0b4a8;
  margin-top: 16px; text-align: center;
}
.hint code {
  background: #f0faf5;
  padding: 2px 8px;
  border-radius: 5px;
  color: #1a6b4a;
  font-family: monospace;
}
</style>
</head>
<body>
<div class="card">
  <div class="card-logo">
    <div class="logo-shield">
      <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 2.5L3.5 6.5V12c0 4.142 3.134 8.02 7.5 8.967C15.366 20.02 18.5 16.142 18.5 12V6.5L11 2.5z" fill="white" opacity=".2" stroke="white" stroke-width="1.4"/>
        <path d="M8 11.5l2 2L14.5 9" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="logo-text">
      <strong>ConstitutionAware</strong>
      <span>Admin Portal</span>
    </div>
  </div>

  <h1>Sign In</h1>
  <p class="sub">Access the analytics and response dashboard.</p>

  <div class="field">
    <label>Username</label>
    <input type="text" id="usr" placeholder="Enter username" value="admin"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="pwd" placeholder="••••••••••" onkeydown="if(event.key==='Enter')login()"/>
  </div>

  <div class="err-msg" id="err">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#dc2626" stroke-width="1.4"/><path d="M7.5 4v4M7.5 10.5v.2" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/></svg>
    Incorrect username or password.
  </div>

  <button class="btn-login" onclick="login()">Sign In →</button>

  <p class="hint">Credentials: <code>Mma2007</code> / <code>Malik_4370che18</code></p>

  <div class="card-footer">
    <a href="index.html">← Back to Survey</a>
    <a href="dashboard.html">Go to Dashboard →</a>
  </div>
</div>

<script>
async function login() {
  const usr = document.getElementById('usr').value.trim();
  const pwd = document.getElementById('pwd').value;
  const err = document.getElementById('err');
  err.classList.remove('show');

  const { data, error } = await supabase
    .from('admins')
    .select('*')
    .eq('username', usr)
    .eq('password', pwd)
    .single();

  if (data) {
    sessionStorage.setItem('admin-ok', '1');
    window.location.href = 'dashboard.html';
  } else {
    err.classList.add('show');
  }
}
</script>
</body>
</html>
